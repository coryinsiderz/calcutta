{% extends "base.html" %}
{% block title %}Live Board{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto space-y-6">

  <!-- Status bar -->
  <div class="flex items-center gap-3 flex-wrap">
    <span id="status-badge" class="px-3 py-1 rounded text-xs font-bold uppercase bg-gray-700">idle</span>
    <span id="progress-text" class="text-gray-500 text-sm"></span>
    <span id="phase-badge" class="ml-auto text-gray-300 font-bold text-sm"></span>
  </div>

  <!-- Current team card (bot-run mode) -->
  <div id="team-card" class="bg-gray-900 border border-gray-700 rounded-xl p-6 text-center hidden">
    <div id="team-flag"   class="text-7xl mb-2"></div>
    <div id="team-name"   class="text-3xl font-bold tracking-widest mb-4"></div>
    <div id="bid-section">
      <div id="no-bid-msg" class="text-gray-500 text-lg">Waiting for opening bid — type <code class="bg-gray-800 px-1 rounded">/bid &lt;amount&gt;</code></div>
      <div id="high-bid-section" class="hidden">
        <div id="high-bid"    class="text-5xl font-bold text-gray-100 mb-1"></div>
        <div id="high-bidder" class="text-gray-400 text-lg"></div>
      </div>
    </div>
  </div>

  <!-- Summary card (shown whenever no team is actively up: before / offline / after) -->
  <div id="summary-card" class="bg-gray-900 border border-gray-700 rounded-xl p-8 text-center">
    <div class="text-gray-500 text-xs uppercase tracking-widest mb-1">Pot</div>
    <div id="pot-big" class="text-6xl font-bold text-gray-100 mb-2">$0</div>
    <div id="summary-sub" class="text-gray-400">0 of 48 sold</div>
    <div id="summary-label" class="text-gray-600 text-sm mt-2"></div>
  </div>

  <!-- Two-column lower section -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <div class="bg-gray-900 border border-gray-700 rounded-xl p-4">
      <h3 class="text-gray-400 text-xs uppercase tracking-widest mb-3">Bids this team</h3>
      <ul id="recent-bids" class="space-y-1 text-sm"></ul>
    </div>
    <div class="bg-gray-900 border border-gray-700 rounded-xl p-4">
      <h3 class="text-gray-400 text-xs uppercase tracking-widest mb-3">Recently sold</h3>
      <ul id="recent-sold" class="space-y-1 text-sm"></ul>
    </div>
  </div>

</div>

<script>
const STATUS_COLORS = {
  running: 'bg-gray-600',
  paused:  'bg-gray-700',
  idle:    'bg-gray-800',
  done:    'bg-gray-700',
};
const PHASE_TEXT = { once: 'Going once...', twice: 'Going twice...', none: '' };

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function refresh() {
  try {
    const r = await fetch('/api/state');
    const d = await r.json();

    const badge = document.getElementById('status-badge');
    badge.textContent = d.status;
    badge.className = `px-3 py-1 rounded text-xs font-bold uppercase ${STATUS_COLORS[d.status] || 'bg-gray-700'}`;

    document.getElementById('progress-text').textContent =
      `${d.teams_sold} sold · ${d.remaining_teams} remaining`;
    document.getElementById('phase-badge').textContent = PHASE_TEXT[d.silence_phase] || '';

    const teamCard = document.getElementById('team-card');
    const summaryCard = document.getElementById('summary-card');

    if (d.current_team) {
      // Bot-run mode: a team is actively up
      teamCard.classList.remove('hidden');
      summaryCard.classList.add('hidden');
      document.getElementById('team-flag').textContent = d.current_team.flag;
      document.getElementById('team-name').textContent = d.current_team.name;
      if (d.high_bid) {
        document.getElementById('no-bid-msg').classList.add('hidden');
        document.getElementById('high-bid-section').classList.remove('hidden');
        document.getElementById('high-bid').textContent = `$${d.high_bid.toLocaleString()}`;
        document.getElementById('high-bidder').textContent = `@${d.high_bidder}`;
      } else {
        document.getElementById('no-bid-msg').classList.remove('hidden');
        document.getElementById('high-bid-section').classList.add('hidden');
      }
    } else {
      // No team actively up: show the pot summary (before / offline logging / after)
      teamCard.classList.add('hidden');
      summaryCard.classList.remove('hidden');
      document.getElementById('pot-big').textContent = `$${(d.pot || 0).toLocaleString()}`;
      document.getElementById('summary-sub').textContent =
        `${d.teams_sold} of 48 sold · ${d.remaining_teams} remaining`;
      let label;
      if (d.status === 'done' || d.remaining_teams === 0) label = 'Auction complete';
      else if (d.teams_sold > 0) label = 'Auction in progress';
      else label = 'Auction not started';
      document.getElementById('summary-label').textContent = label;
    }

    const bidsEl = document.getElementById('recent-bids');
    bidsEl.innerHTML = d.recent_bids.length
      ? d.recent_bids.map(b =>
          `<li class="flex justify-between"><span class="text-gray-300">${esc(b.username)}</span><span class="text-gray-100 font-bold">$${b.amount.toLocaleString()}</span></li>`).join('')
      : '<li class="text-gray-600 text-xs">No live bids</li>';

    const soldEl = document.getElementById('recent-sold');
    soldEl.innerHTML = d.recent_sold.length
      ? d.recent_sold.map(t =>
          `<li class="flex items-center gap-2"><span>${esc(t.flag)}</span><span class="text-gray-300 flex-1 truncate">${esc(t.name)}</span><span class="text-gray-500">${esc(t.buyer)}</span><span class="text-gray-100 font-bold ml-2">$${(t.price||0).toLocaleString()}</span></li>`).join('')
      : '<li class="text-gray-600 text-xs">Nothing sold yet</li>';

  } catch(e) {
    console.error('poll error', e);
  }
}

refresh();
setInterval(refresh, 2000);
</script>
{% endblock %}
