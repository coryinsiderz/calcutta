<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Calcutta{% endblock %} — World Cup 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-mono">
  <nav class="border-b border-gray-800 px-6 py-3 flex items-center gap-6">
    <span class="text-green-400 font-bold tracking-widest">CALCUTTA</span>
    <a href="/"          class="text-gray-400 hover:text-white text-sm">Live</a>
    <a href="/standings" class="text-gray-400 hover:text-white text-sm">Standings</a>
    <a href="/tournament" class="text-gray-400 hover:text-white text-sm">Tournament</a>
    <a href="/config"    class="text-gray-400 hover:text-white text-sm">Config</a>
    <a href="/admin"     class="text-gray-400 hover:text-white text-sm">Admin</a>
  </nav>
  <main class="p-6">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
