<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RcalcuttaC</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-mono">
  <header class="border-b border-gray-800">
    <!-- Header line: brand + section nav -->
    <div class="px-6 py-3 flex items-center gap-6 flex-wrap">
      <span class="font-bold tracking-widest text-gray-100">Calcutta</span>
      <a href="/"           class="text-gray-400 hover:text-white text-sm">Live</a>
      <a href="/standings"  class="text-gray-400 hover:text-white text-sm">Standings</a>
      <a href="/tournament" class="text-gray-400 hover:text-white text-sm">Tournament</a>
      <a href="/config"     class="text-gray-400 hover:text-white text-sm">Config</a>
      <a href="/admin"      class="text-gray-400 hover:text-white text-sm">Admin</a>
    </div>
    <!-- Contest line: fans out independently below the section nav -->
    <div class="px-6 pb-2 flex items-center gap-1 flex-wrap">
      {% for c in nav_contests %}
      <a href="{{ c.href }}" class="px-2 py-1 rounded text-xs border {{ 'border-gray-500 text-gray-100' if c.active else 'border-transparent text-gray-500 hover:text-gray-300' }}">{{ c.label }}</a>
      {% endfor %}
    </div>
  </header>
  <main class="p-6">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
